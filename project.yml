name: App Shelf
options:
  bundleIdPrefix: com.appshelf
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
  configs:
    Release:
      VALIDATE_PRODUCT: true

targets:
  App Shelf:
    type: application
    platform: iOS
    sources:
      - path: "App Shelf"
        excludes:
          - "**/*.entitlements"
      - path: Shared
    info:
      path: "App Shelf/Info.plist"
      properties:
        CFBundleName: App Shelf
        CFBundleDisplayName: App Shelf
        NSPhotoLibraryUsageDescription: "App Shelf uses your photo library to add cover art for your media."
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: "App Shelf/App Shelf.entitlements"
      properties:
        com.apple.security.application-groups:
          - group.com.appshelf.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.appshelf.AppShelf
        INFOPLIST_FILE: "App Shelf/Info.plist"
        CODE_SIGN_ENTITLEMENTS: "App Shelf/App Shelf.entitlements"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - target: AppShelfWidget

  App ShelfTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: App ShelfTests
    dependencies:
      - target: App Shelf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.appshelf.AppShelfTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/App Shelf.app/App Shelf"
        BUNDLE_LOADER: "$(TEST_HOST)"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES

  AppShelfWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: AppShelfWidget
      - path: Shared
      - path: "App Shelf/Models"
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
      - sdk: AppIntents.framework
      - sdk: SwiftData.framework
    info:
      path: AppShelfWidget/Info.plist
      properties:
        CFBundleName: AppShelfWidget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: AppShelfWidget/AppShelfWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.appshelf.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.appshelf.AppShelf.widget
        INFOPLIST_FILE: AppShelfWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: AppShelfWidget/AppShelfWidget.entitlements
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../../Frameworks"
